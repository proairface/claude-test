name: Release

# Cut a release by pushing a version tag, e.g.:  git tag v0.1.0 && git push --tags
# Builds + tests + packages both targets and publishes a GitHub Release with the
# store-ready zips attached. Keep the tag in sync with the manifest version.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # required to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - name: Build, test & package
        working-directory: extension
        run: |
          npm ci
          npm test
          npm run package
      - name: Publish GitHub Release with the zips
        uses: softprops/action-gh-release@v2
        with:
          files: extension/web-ext-artifacts/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
