name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Build both targets
        run: npm run build
      - name: Lint (web-ext, Firefox)
        run: npm run lint:firefox
