<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BrowserSync</title>
    <style>
      body { font: 13px/1.5 system-ui, sans-serif; width: 18rem; margin: 0; padding: .75rem 1rem; }
      h1 { font-size: 14px; margin: 0 0 .5rem; }
      #state { display: flex; align-items: baseline; gap: .4rem; }
      #dot { font-size: 16px; }
      .ok { color: #2e7d32; } .err { color: #c0392b; } .idle { color: #888; }
      #detail { color: #555; margin: .35rem 0 .6rem; min-height: 1.2em; }
      .row { display: flex; gap: .5rem; }
      button { flex: 1; padding: .4rem; cursor: pointer; }
      a { display: inline-block; margin-top: .5rem; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>BrowserSync</h1>
    <div id="state"><span id="dot" class="idle">●</span><strong id="headline">No sync yet</strong></div>
    <div id="detail"></div>
    <div class="row">
      <button id="syncNow">Sync now</button>
      <button id="settings">Settings</button>
    </div>
    <a id="openOptions" href="#">Open full settings page</a>
    <script type="module" src="popup.js"></script>
  </body>
</html>
