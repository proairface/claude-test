<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BrowserSync</title>
    <style>
      body { font: 13px/1.5 system-ui, sans-serif; width: 20rem; margin: 0; padding: .75rem .9rem; }
      h1 { font-size: 14px; margin: 0 0 .5rem; }
      #state { display: flex; align-items: baseline; gap: .4rem; }
      #dot { font-size: 16px; }
      .ok { color: #2e7d32; } .err { color: #c0392b; } .idle { color: #888; }
      #detail { color: #555; margin: .3rem 0 .5rem; min-height: 1em; }
      hr { border: none; border-top: 1px solid #eee; margin: .6rem 0; }
      section h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .03em; color: #888; margin: 0 0 .35rem; }
      .row { display: flex; gap: .4rem; align-items: center; }
      button { padding: .35rem .5rem; cursor: pointer; }
      input[type=text], input[type=search] { flex: 1; padding: .35rem; box-sizing: border-box; }
      #results { max-height: 11rem; overflow: auto; margin-top: .35rem; }
      #results a { display: block; padding: .2rem 0; text-decoration: none; color: #1a56c4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      #results .u { color: #999; font-size: 11px; }
      a.link { font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>BrowserSync</h1>
    <div id="state"><span id="dot" class="idle">●</span><strong id="headline">No sync yet</strong></div>
    <div id="detail"></div>
    <div class="row">
      <button id="syncNow">Sync now</button>
      <button id="settings">Settings</button>
    </div>

    <hr />
    <section id="pageSection">
      <h2>This page</h2>
      <div id="pageBody"><span class="idle">—</span></div>
    </section>

    <hr />
    <section>
      <h2>Find a bookmark</h2>
      <input id="bmSearch" type="search" placeholder="search title or URL…" autocomplete="off" />
      <div id="results"></div>
    </section>

    <hr />
    <a id="openManager" class="link" href="#">Open bookmark manager →</a>
    <script type="module" src="popup.js"></script>
  </body>
</html>
